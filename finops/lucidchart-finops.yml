meters:
- name: user_seats
  description: Per-user monthly subscription. Individual $7.95, Team $9 (Lucidchart)
    or $12 (Suite), Enterprise contract.
  unit: seat
  aggregation: sum
  dimensions:
  - account
  - plan
  - product
principles:
- name: Visibility
  description: Use Lucid admin console license reports to inventory active users and plan
    tier.
- name: Allocation
  description: Allocate user seats by team membership; tag enterprise contract spend to
    procuring business units.
- name: Optimization
  description: Reclaim seats from inactive users; downgrade Suite seats to Lucidchart-only
    where the user does not use Lucidspark/Lucidscale; choose annual billing for the
    discount.
- name: Accountability
  description: Assign an admin owner per Lucid account; review quarterly seat counts
    against active-user reports.
