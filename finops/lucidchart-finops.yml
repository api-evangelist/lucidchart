description: FOCUS-aligned FinOps profile for Lucidchart. Lucidchart bills as a per-user
  monthly subscription across Free, Individual, Team, and Enterprise. Team and Enterprise
  are sold as part of the Lucid Visual Collaboration Suite (Lucidchart + Lucidspark +
  Lucidscale) for a single per-user fee. Developer API use does not add metered API charges.
