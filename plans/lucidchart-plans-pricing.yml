specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Lucidchart
providerId: lucidchart
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Productivity
- Diagramming
- Visualization
- Visual Workspace
- SaaS
- Plans
description: Lucidchart plans reconciled against the public Lucidchart pricing page.
  Per-user monthly subscription with feature gating across Free, Individual, Team, and
  Enterprise. Lucid bundles Lucidchart, Lucidspark, and Lucidscale into the Visual
  Collaboration Suite at the Team and Enterprise tiers.
notes: Pricing reflects the publicly listed retail rates. Volume and annual-commitment
  discounts are negotiated separately.
sources:
- https://www.lucidchart.com/pages/pricing/lucidchart
- https://developer.lucid.co/
plans:
- id: lucidchart-free
  name: Free
  type: free
  description: Free tier for individuals to evaluate the product.
  entries:
  - label: Per-User
    name: seat
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Editable Documents
    name: editable_documents
    type: flat
    metric: document
    limit: 3
    timeFrame: usage
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: 100 Templates
  - name: Basic Integrations
- id: lucidchart-individual
  name: Individual
  type: paid
  description: Single-user professional plan with unlimited documents and integrations.
  entries:
  - label: Per-User Monthly
    name: seat_monthly
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 7.95
    userMultiplied: true
  elements:
  - name: Unlimited Documents
  - name: 1,000+ Templates
  - name: Premium Integrations
  - name: Visio Import/Export
  - name: Custom Shape Libraries
- id: lucidchart-team
  name: Team
  type: paid
  description: Per-user team plan including the Lucid Visual Collaboration Suite (Lucidchart
    + Lucidspark + Lucidscale).
  entries:
  - label: Per-User Monthly (Lucidchart)
    name: seat_monthly_chart
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 9
    userMultiplied: true
  - label: Per-User Monthly (Suite)
    name: seat_monthly_suite
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 12
    userMultiplied: true
  elements:
  - name: Visual Collaboration Suite
  - name: Team Folders
  - name: Admin Console
  - name: Advanced Sharing
  - name: Premium Templates
  - name: Account-Level Licensing
- id: lucidchart-enterprise
  name: Enterprise
  type: enterprise
  description: For large organizations needing SSO, SCIM, advanced security, and account
    management. Custom contract pricing.
  entries:
  - label: Per-User Subscription
    name: seat
    type: flat
    metric: user
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: true
  elements:
  - name: SSO (SAML)
  - name: SCIM Provisioning
  - name: Advanced Account Management
  - name: Auto-Provisioning
  - name: Universal Canvas
  - name: Premium Support
